<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fine Print Fortune</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=Jacquard+24&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #B5D3EB;
      min-height: 100vh;
      font-family: 'Courier Prime', monospace;
      color: #31261A;
      padding: 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .title {
      font-family: 'Jacquard 24', serif;
      font-size: 32pt;
      font-weight: normal;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: rgba(49,38,26,0.8);
      letter-spacing: 0.06em;
    }

    .status-box {
      background: transparent;
      border: none;
      padding: 16px 0;
      margin-bottom: 20px;
      text-align: center;
    }

    .status-text {
      font-size: 15px;
      line-height: 1.8;
      margin-bottom: 16px;
      color: #31261A;
      font-weight: normal;
    }

    .status-text strong {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      font-size: 16px;
    }

    .welcome-message {
      background: rgba(246, 197, 108, 0.15);
      border: 2px dashed rgba(49,38,26,0.3);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
      text-align: center;
    }

    .welcome-message p {
      font-size: 14px;
      line-height: 1.7;
      color: rgba(49,38,26,0.9);
      margin: 0;
    }

    .result-box {
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid #31261A;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .btn {
      font-family: 'Courier Prime', monospace;
      font-size: 14px;
      letter-spacing: 0.08em;
      color: #31261A;
      background: #F6C56C;
      border: 1px solid #31261A;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s, filter 0.2s;
      width: 100%;
      display: block;
    }

    .btn:hover {
      transform: translateY(-2px);
      filter: drop-shadow(0 4px 10px rgba(49,38,26,0.2));
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .loading {
      text-align: center;
      padding: 40px 20px;
      font-size: 14px;
      color: rgba(49,38,26,0.8);
      font-style: italic;
    }

    .loading::before {
      content: "🔮";
      display: block;
      font-size: 32px;
      margin-bottom: 12px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 0.6;
        transform: scale(1);
      }
      50% {
        opacity: 1;
        transform: scale(1.1);
      }
    }

    .spread {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-top: 20px;
    }

    .card-slot {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid #31261A;
      border-radius: 12px;
      padding: 16px;
    }

    .card-label {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #31261A;
      font-weight: bold;
      margin-bottom: 12px;
      text-align: center;
    }

    .card-image-container {
      text-align: center;
      margin-bottom: 12px;
    }

    .card-image {
      max-width: 100%;
      height: auto;
      max-height: 200px;
      border-radius: 8px;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.2));
      transition: transform 0.3s ease;
    }

    .card-image.reversed {
      transform: rotate(180deg);
    }

    .card-name {
      font-weight: bold;
      font-size: 15px;
      text-align: center;
      margin-bottom: 8px;
    }

    .card-reading {
      font-size: 13px;
      line-height: 1.6;
      color: rgba(49,38,26,0.9);
    }

    .reversed-badge {
      display: inline-block;
      background: #FF6B6B;
      color: white;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 4px;
      margin-left: 8px;
      letter-spacing: 0.08em;
    }

    .error {
      background: #FFE5E5;
      border: 1px solid #FF6B6B;
      color: #CC0000;
      padding: 16px;
      border-radius: 12px;
      font-size: 13px;
      margin-bottom: 20px;
    }

    #detectedPage {
      font-size: 11px;
      color: rgba(49,38,26,0.6);
      margin-top: 8px;
      word-break: break-all;
      font-style: italic;
    }

    .btn-history {
      background: #8CB6D4;
      margin-top: 12px;
    }

    .btn-history:hover {
      background: #7AA5C3;
    }

    .receipt-details {
      margin-top: 12px;
      border-top: 1px solid rgba(49,38,26,0.15);
      padding-top: 12px;
    }

    .receipt-link {
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      color: #31261A;
      padding: 4px 0;
      user-select: none;
      list-style: none;
    }

    .receipt-link::-webkit-details-marker {
      display: none;
    }

    .receipt-link:hover {
      text-decoration: underline;
    }

    .receipt-content {
      margin-top: 8px;
      padding: 12px;
      background: rgba(246, 197, 108, 0.2);
      border-radius: 8px;
      border: 1px solid rgba(49,38,26,0.1);
    }

    .citation-item {
      margin-bottom: 12px;
      font-size: 12px;
      line-height: 1.5;
    }

    .citation-item:last-child {
      margin-bottom: 0;
    }

    .citation-section {
      font-weight: bold;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(49,38,26,0.7);
      margin-bottom: 4px;
    }

    .citation-text {
      font-style: italic;
      color: rgba(49,38,26,0.85);
      display: block;
      padding-left: 8px;
      border-left: 2px solid rgba(49,38,26,0.3);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">Fine Print<br>Fortune</div>
    <div class="subtitle">Tarot readings for Terms of Service</div>
  </div>

  <div id="app">
    <div class="loading">Initializing...</div>
  </div>

  <script src="narrative_v2_implementation.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
