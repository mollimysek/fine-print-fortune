<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fine Print Fortune</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=Jacquard+24&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #B5D3EB;
      min-height: 100vh;
      font-family: 'Courier Prime', monospace;
      color: #31261A;
      padding: 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .title {
      font-family: 'Jacquard 24', serif;
      font-size: 32pt;
      font-weight: normal;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: rgba(49,38,26,0.8);
      letter-spacing: 0.06em;
    }

    .status-box {
      background: transparent;
      border: none;
      padding: 16px 0;
      margin-bottom: 20px;
      text-align: center;
    }

    .status-text {
      font-size: 15px;
      line-height: 1.8;
      margin-bottom: 16px;
      color: #31261A;
      font-weight: normal;
    }

    .status-text strong {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      font-size: 16px;
    }

    .welcome-message {
      font-size: 14px;
      text-align: center;
      padding: 16px;
      background: rgba(49,38,26,0.06);
      border-radius: 12px;
      line-height: 1.7;
      margin-bottom: 16px;
    }

    .welcome-message p {
      margin: 0;
    }

    .reading-summary {
      font-size: 14px;
      text-align: center;
      padding: 16px;
      background: rgba(49,38,26,0.06);
      border-radius: 12px;
      line-height: 1.7;
      margin-bottom: 16px;
    }

    .btn {
      font-family: 'Courier Prime', monospace;
      font-size: 14px;
      letter-spacing: 0.08em;
      color: #31261A;
      background: #F6C56C;
      border: 1px solid #31261A;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s, filter 0.2s;
      width: 100%;
      display: block;
    }

    .btn:hover {
      transform: translateY(-2px);
      filter: drop-shadow(0 4px 10px rgba(49,38,26,0.2));
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .loading {
      text-align: center;
      padding: 40px 20px;
      font-size: 14px;
      color: rgba(49,38,26,0.8);
      font-style: italic;
    }

    .loading::before {
      content: "🔮";
      display: block;
      font-size: 32px;
      margin-bottom: 12px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 0.6;
        transform: scale(1);
      }
      50% {
        opacity: 1;
        transform: scale(1.1);
      }
    }

    .spread {
      display: flex;
      flex-direction: column;
      gap: 0;
      margin-top: 0;
      margin-bottom: 20px;
      border-top: 1px solid rgba(49,38,26,0.2);
    }

    .btn-history {
      margin-top: auto;
    }

    .card-slot {
      padding: 28px 0 16px;
      border-bottom: 1px solid rgba(49,38,26,0.2);
    }

    .card-slot:last-child {
      border-bottom: none;
    }

    .card-label {
      display: inline-block;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #31261A;
      font-weight: normal;
      border: 1px solid #000;
      border-radius: 100px;
      padding: 5px 12px 3px;
      margin-bottom: 12px;
      text-align: center;
    }
    .card-slot { text-align: center; }
    .card-label.collection { background: #A8DDFF; }
    .card-label.sharing    { background: #F7E0AA; }
    .card-label.retention  { background: #D9CDFC; }

    .card-image-container {
      text-align: center;
      margin-bottom: 12px;
    }

    .card-image {
      max-width: 100%;
      height: auto;
      max-height: 200px;
      border-radius: 8px;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.2));
      transition: transform 0.3s ease;
    }

    .card-image.reversed {
      transform: rotate(180deg);
    }

    .card-name {
      font-family: 'Jacquard 24', serif;
      font-size: 24px;
      font-weight: normal;
      text-align: center;
      margin-bottom: 8px;
    }

    .card-reading {
      font-size: 14px;
      line-height: 1.6;
      color: rgba(49,38,26,0.9);
      text-align: left;
    }

    .reversed-badge {
      display: inline-block;
      background: #FF6B6B;
      color: white;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 4px;
      margin-left: 8px;
      letter-spacing: 0.08em;
    }

    .error {
      background: #FFE5E5;
      border: 1px solid #FF6B6B;
      color: #CC0000;
      padding: 16px;
      border-radius: 12px;
      font-size: 13px;
      margin-bottom: 20px;
    }

    #detectedPage {
      font-size: 11px;
      color: rgba(49,38,26,0.6);
      margin-bottom: 12px;
      word-break: break-all;
      font-style: italic;
      text-align: center;
    }

    .reading-actions {
      border-top: 1px solid rgba(49,38,26,0.2);
      padding-top: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .btn-history-link {
      background: none;
      border: none;
      font-family: 'Courier Prime', monospace;
      font-size: 13px;
      color: rgba(49,38,26,0.7);
      text-decoration: underline;
      cursor: pointer;
      padding: 0;
      letter-spacing: 0.04em;
      display: block;
      width: 100%;
      text-align: center;
      margin-top: 24px;
    }

    .reading-actions .btn-history-link {
      margin-top: 0;
    }

    .btn-history-link:hover {
      color: #31261A;
    }

    .receipt-details {
      margin-top: 12px;
      border-top: 1px solid rgba(49,38,26,0.15);
      padding-top: 12px;
    }

    .receipt-link {
      font-size: 14px;
      font-weight: normal;
      text-decoration: underline;
      cursor: pointer;
      color: #31261A;
      padding: 4px 0;
      user-select: none;
      list-style: none;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .receipt-link::-webkit-details-marker {
      display: none;
    }

    .receipt-details summary::after {
      content: '›';
      font-size: 16px;
      line-height: 1;
      transition: transform 0.2s ease;
    }

    .receipt-details[open] summary::after {
      transform: rotate(90deg);
    }

    .receipt-content {
      margin-top: 8px;
      padding: 12px;
      background: rgba(140, 182, 212, 0.18);
      border-radius: 8px;
      border: 1px solid rgba(49,38,26,0.1);
    }

    .citation-item {
      margin-bottom: 12px;
      font-size: 13px;
      line-height: 1.5;
    }

    .citation-item:last-child {
      margin-bottom: 0;
    }

    .citation-section {
      font-weight: bold;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(49,38,26,0.7);
      margin-bottom: 4px;
    }

    .citation-text {
      font-style: italic;
      color: rgba(49,38,26,0.85);
      display: block;
      padding-left: 8px;
      border-left: 2px solid rgba(49,38,26,0.3);
    }

    .card-summary {
      margin-top: 12px;
      border-top: 1px solid rgba(49,38,26,0.15);
      padding-top: 12px;
    }

    .summary-label {
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      color: #31261A;
      padding: 4px 0;
      user-select: none;
      list-style: none;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .summary-label::-webkit-details-marker {
      display: none;
    }

    .summary-label:hover {
      text-decoration: underline;
    }

    .card-summary summary::after {
      content: '›';
      font-size: 16px;
      line-height: 1;
      transition: transform 0.2s ease;
    }

    .card-summary[open] summary::after {
      transform: rotate(90deg);
    }

    .summary-content {
      margin-top: 8px;
      padding: 12px;
      background: rgba(139, 182, 212, 0.15);
      border-radius: 8px;
      border: 1px solid rgba(49,38,26,0.1);
      font-size: 13px;
      line-height: 1.6;
      color: rgba(49,38,26,0.9);
      white-space: pre-wrap;
      text-align: left;
    }

    /* History view styles */
    .history-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .btn-back {
      background: transparent;
      border: 1px solid #31261A;
      padding: 8px 12px;
      border-radius: 6px;
      font-family: 'Courier Prime', monospace;
      font-size: 14px;
      cursor: pointer;
      color: #31261A;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .btn-back:hover {
      background: rgba(49,38,26,0.05);
    }

    .history-title {
      font-size: 18px;
      font-weight: normal;
      color: #31261A;
      margin: 0;
      flex-grow: 1;
    }

    .history-empty {
      background: rgba(246, 197, 108, 0.15);
      border: 2px dashed rgba(49,38,26,0.3);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
      text-align: center;
    }

    .history-empty p {
      font-size: 14px;
      line-height: 1.7;
      color: rgba(49,38,26,0.9);
      margin: 0;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }

    .history-item {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid #31261A;
      border-radius: 12px;
      padding: 12px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .history-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(49,38,26,0.15);
    }

    .history-item-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .history-date {
      font-size: 13px;
      font-weight: bold;
      color: #31261A;
    }

    .history-time {
      font-size: 11px;
      font-weight: normal;
      color: rgba(49,38,26,0.6);
    }

    .history-delete-btn {
      background: transparent;
      border: none;
      font-size: 24px;
      line-height: 1;
      color: rgba(49,38,26,0.5);
      cursor: pointer;
      padding: 0;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      transition: background 0.2s, color 0.2s;
    }

    .history-delete-btn:hover {
      background: rgba(255,107,107,0.1);
      color: #FF6B6B;
    }

    .history-platform {
      font-size: 12px;
      color: rgba(49,38,26,0.7);
      margin-bottom: 8px;
      font-style: italic;
    }

    .history-cards {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .history-card-tag {
      background: rgba(49,38,26,0.08);
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      color: rgba(49,38,26,0.85);
      white-space: nowrap;
    }

    .btn-clear-history {
      background: none;
      border: none;
      color: #31261A;
    }

    .btn-clear-history:hover {
      background: rgba(49,38,26,0.06);
    }

    .history-detail-header {
      margin-bottom: 16px;
    }

    /* Manual input styles */
    .manual-input-container {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid #31261A;
      border-radius: 12px;
      padding: 20px;
    }

    .manual-input-title {
      font-size: 18px;
      font-weight: bold;
      color: #31261A;
      margin: 0 0 12px 0;
      text-align: center;
    }

    .manual-input-instructions {
      font-size: 13px;
      line-height: 1.6;
      color: rgba(49,38,26,0.8);
      margin: 0 0 16px 0;
      text-align: center;
    }

    .manual-text-input {
      width: 100%;
      font-family: 'Courier Prime', monospace;
      font-size: 13px;
      padding: 12px;
      border: 1px solid #31261A;
      border-radius: 8px;
      background: #FFFFFF;
      color: #31261A;
      resize: vertical;
      min-height: 200px;
      margin-bottom: 16px;
    }

    .manual-text-input:focus {
      outline: none;
      border-color: #F6C56C;
      box-shadow: 0 0 0 2px rgba(246, 197, 108, 0.2);
    }

    .manual-text-input::placeholder {
      color: rgba(49,38,26,0.4);
      font-style: italic;
    }

    .manual-input-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .manual-input-buttons .btn {
      flex: 1;
      margin: 0;
    }

    .btn-paste {
      background: #8CB6D4;
    }

    .btn-paste:hover {
      background: #7AA5C3;
    }

    .btn-secondary {
      background: rgba(49,38,26,0.1);
      color: #31261A;
    }

    .btn-secondary:hover {
      background: rgba(49,38,26,0.2);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">Fine Print<br>Fortune</div>
  </div>

  <div id="app">
    <div class="loading">Initializing...</div>
  </div>

  <script src="narrative_v2_implementation.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
